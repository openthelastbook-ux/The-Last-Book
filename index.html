<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>The Last Book</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Beth+Ellen&family=Courier+Prime:wght@400;700&family=Playfair+Display:wght@400;700&family=Zilla+Slab:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8da48d" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Last Book">
    <link rel="apple-touch-icon" href="/launchericon-192x192.png">

    <style>
        /* ── 主题变量 ── */
        :root {
            --bg:       #8da48d;
            --text:     #1a1a1a;
            --font:     'Courier Prime', monospace;
            --item-bg:  rgba(255,255,255,0.3);
            --border:   1px solid rgba(0,0,0,0.15);
            --accent:   #fcfcfc;
            --track-bg: rgba(0,0,0,0.08);
            --danger:   #e74c3c;
        }
        body.theme-vintage {
            --bg:       #c9a99a;
            --text:     #2c1a14;
            --font:     'Playfair Display', serif;
            --item-bg:  rgba(255,245,238,0.78);
            --border:   1px solid rgba(100,50,30,0.18);
            --accent:   #7a3728;
            --track-bg: rgba(0,0,0,0.07);
        }
        body.theme-blue {
            --bg:       #c0d6eb;
            --text:     #1c3d5a;
            --font:     'Zilla Slab', serif;
            --item-bg:  #fdfdfd;
            --border:   1px solid rgba(28,61,90,0.14);
            --accent:   #b8211b;
            --track-bg: rgba(0,0,0,0.08);
        }

        /* ── 全局基础 ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; overflow: hidden; transition: background 0.4s, color 0.4s; }
        input, textarea, [contenteditable] { user-select: text; font-family: inherit; }

        /* ── 应用容器 ── */
        #app { position: relative; width: 100%; height: 100%; max-width: 600px; margin: 0 auto; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; transition: background 0.4s; }

        /* ── Header ── */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; flex-shrink: 0; }
        .header-title { font-size: 22px; font-weight: bold; letter-spacing: 2px; flex: 1; text-align: center; }
        /* vintage 主题标题换字体，无边框 */
        body.theme-vintage .header-title { font-family: 'Beth Ellen', cursive; font-size: 20px; letter-spacing: 2px; font-weight: normal; }
        body.theme-vintage .detail-header span { font-family: 'Beth Ellen', cursive; font-size: 20px; letter-spacing: 2px; font-weight: normal; }

        .theme-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; background: var(--accent); border: 1.5px solid rgba(255,255,255,0.6); box-shadow: 0 1px 4px rgba(0,0,0,0.15); transition: transform 0.15s, background 0.4s; flex-shrink: 0; }
        .theme-dot:active { transform: scale(1.3); }

        /* ── 主列表 ── */
        #list-view { display: flex; flex-direction: column; height: 100%; }
        #notes-container { flex: 1; overflow-y: auto; padding: 8px 18px; scroll-behavior: smooth; }
        #notes-container::-webkit-scrollbar { display: none; }

        .note-wrapper { position: relative; margin-bottom: 12px; border-radius: 10px; background: var(--track-bg); box-shadow: inset 0 2px 6px rgba(0,0,0,0.12); overflow: hidden; touch-action: pan-y; }
        .note-item { position: relative; background: var(--item-bg); border: var(--border); padding: 13px 18px; border-radius: 10px; z-index: 1; transition: transform 0.3s cubic-bezier(0.25,0.8,0.25,1); box-shadow: 0 2px 6px rgba(0,0,0,0.08); cursor: grab; display: flex; align-items: center; justify-content: center; min-height: 50px; touch-action: pan-y; }
        .note-chosen .note-item { transform: scale(1.03) !important; box-shadow: 0 10px 22px rgba(0,0,0,0.18) !important; border-color: var(--accent); }
        .note-ghost { opacity: 0; }
        .note-text { font-size: 15px; font-weight: bold; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 4px 8px; border-radius: 4px; outline: none; transition: background 0.2s; }
        .note-text[contenteditable="true"] { cursor: text; }
        .note-text[contenteditable="true"]:focus { background: rgba(255,255,255,0.4); border: 1px dashed rgba(0,0,0,0.18); }

        /* ── 输入区 ── */
        #input-area { padding: 12px 18px; background: rgba(0,0,0,0.05); flex-shrink: 0; display: flex; align-items: flex-end; gap: 10px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        #main-input { flex: 1; background: var(--item-bg); border: var(--border); border-radius: 20px; padding: 11px 15px; font-size: 16px; outline: none; color: var(--text); resize: none; min-height: 44px; max-height: 120px; overflow-y: auto; }
        #send-btn { background: var(--accent); color: var(--bg); border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
        #send-btn:active { opacity: 0.7; }

        /* ── 归档视图 ── */
        #archive-view { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--bg); transition: transform 0.3s ease; display: flex; flex-direction: column; z-index: 20; }
        #archive-view.active { transform: translateX(100%); }
        .archive-item { background: var(--item-bg); border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
        .archive-row { display: flex; align-items: stretch; }
        .arch-del { color: var(--danger); font-size: 20px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; border-right: 1px dashed rgba(0,0,0,0.08); }
        .arch-del:active { opacity: 0.5; }
        .arch-label { flex: 1; padding: 15px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .arch-restore { font-size: 24px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; border-left: 1px dashed rgba(0,0,0,0.08); transition: transform 0.15s; }
        .arch-restore:active { transform: scale(1.2); }

        /* ── 详情视图 ── */
        #detail-view { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); transition: transform 0.3s ease; display: flex; flex-direction: column; z-index: 30; }
        #detail-view.active { transform: translateX(-100%); }
        .detail-header { display: flex; align-items: center; padding: 15px 18px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        .back-btn { margin-right: 12px; cursor: pointer; font-size: 20px; padding: 8px; }
        #detail-editor { flex: 1; padding: 18px; overflow-y: auto; outline: none; line-height: 1.7; font-size: 16px; }
        #detail-editor[data-empty="true"]::before { content: "在此处补充详细文字…"; opacity: 0.4; }
        #detail-editor img { width: 4.5em; height: 4.5em; object-fit: cover; border-radius: 6px; margin: 3px; cursor: zoom-in; display: inline-block; vertical-align: top; box-shadow: 0 1px 4px rgba(0,0,0,0.15); transition: transform 0.12s; }
        #detail-editor img:active { transform: scale(1.06); }

        /* ── 底部面板 ── */
        #bottom-panel { flex-shrink: 0; background: rgba(255,255,255,0.08); border-top: 1px solid rgba(0,0,0,0.1); padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; gap: 8px; }
        .timeline-box { flex: 1; display: flex; flex-direction: column; gap: 7px; position: relative; overflow: hidden; }
        .row-item { display: flex; align-items: flex-start; gap: 8px; background: var(--item-bg); padding: 9px 10px; border-radius: 8px; border: var(--border); }
        .row-label { font-size: 12px; opacity: 0.65; width: 42px; margin-top: 2px; white-space: nowrap; flex-shrink: 0; }
        .row-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; resize: none; overflow: hidden; display: block; }
        .row-input::placeholder { opacity: 0.5; font-size: 20px; line-height: 1.2; }
        .btn-col { width: 40px; display: flex; flex-direction: column; gap: 6px; }
        .act-btn { background: var(--accent); color: var(--bg); border: none; width: 40px; flex: 1; border-radius: 7px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: opacity 0.15s; }
        .act-btn:active { opacity: 0.7; }
        .act-btn.red { background: #b8211b; color: #fff; }

        /* 折叠动画 */
        @keyframes foldLeft { to { transform: translateX(-110%) scale(0.5); opacity: 0; } }
        .folding { animation: foldLeft 0.35s ease forwards; pointer-events: none; }

        /* ── 图片放大 ── */
        #img-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 250; align-items: center; justify-content: center; }
        #img-lightbox.open { display: flex; }
        #img-lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; object-fit: contain; }
        #lb-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; background: none; border: none; }

        /* ── 历史轮播 ── */
        #history-carousel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        #history-carousel.open { display: flex; }
        .c-card { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 20px 18px; color: #fff; position: relative; min-height: 90px; width: calc(100vw - 48px); max-width: 440px; }
        .c-time  { font-size: 12px; opacity: 0.5; margin-bottom: 8px; }
        .c-label { font-size: 13px; color: #ffaaaa; font-weight: bold; margin-bottom: 6px; }
        .c-text  { font-size: 15px; line-height: 1.7; padding-right: 36px; }
        .c-del   { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.55); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
        .c-del:active { background: rgba(255,80,80,0.3); }
        .c-nav   { display: flex; gap: 20px; margin-top: 20px; align-items: center; }
        .c-arrow { background: rgba(255,255,255,0.14); border: none; color: #fff; font-size: 20px; padding: 10px 16px; border-radius: 50%; cursor: pointer; transition: background 0.15s; }
        .c-arrow:active { background: rgba(255,255,255,0.28); }
        #c-counter { color: rgba(255,255,255,0.6); font-size: 14px; min-width: 50px; text-align: center; }

        /* ── PWA 安装弹窗 ── */
        #install-prompt { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #fff; color: #222; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.16); padding: 20px 22px; z-index: 300; width: 300px; text-align: center; }
        .i-state { display: none; }
        .i-state.on { display: block; }
        .i-step { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; margin-bottom: 8px; font-size: 13px; transition: all 0.3s; }
        .i-num  { width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-weight: bold; }

        /* ── 加载动画 ── */
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
        .loading { font-style: italic; opacity: 0.6; font-size: 14px; animation: pulse 1.4s infinite; }
    </style>
</head>
<body>

<div id="app">

    <!-- ① 主列表 -->
    <div id="list-view">
        <div class="header">
            <i class="fa-solid fa-box-archive" onclick="openArchive()" style="cursor:pointer;font-size:19px;flex-shrink:0;"></i>
            <span class="header-title">THE LAST BOOK</span>
            <div class="theme-dot" onclick="cycleTheme()"></div>
        </div>
        <div id="notes-container"></div>
        <div id="input-area">
            <textarea id="main-input" placeholder="输入想法…" rows="1" oninput="autoResize(this)"></textarea>
            <button id="send-btn" onclick="addNote()"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
    </div>

    <!-- ② 归档视图 -->
    <div id="archive-view">
        <div class="header">
            <span style="width:24px;"></span>
            <span class="header-title" style="font-size:18px;letter-spacing:1px;">收纳筐 / Archive</span>
            <i class="fa-solid fa-times" onclick="closeArchive()" style="cursor:pointer;font-size:20px;flex-shrink:0;"></i>
        </div>
        <div id="archive-container" style="flex:1;overflow-y:auto;padding:10px 18px;"></div>
    </div>

    <!-- ③ 详情视图 -->
    <div id="detail-view">
        <div class="detail-header">
            <i class="fa-solid fa-chevron-left back-btn" onclick="closeDetail()"></i>
            <span style="flex:1;text-align:center;font-weight:bold;font-size:16px;">详情 / Details</span>
            <i class="fa-solid fa-image" onclick="document.getElementById('img-input').click()" style="font-size:19px;cursor:pointer;padding:8px;opacity:0.65;"></i>
        </div>
        <div id="detail-editor" contenteditable="true" data-empty="true" oninput="checkEditorEmpty(this)"></div>
        <div id="bottom-panel">
            <div class="timeline-box" id="timeline-box">
                <div class="row-item"><span class="row-label">时间</span><input type="text" class="row-input" id="dt-time" readonly></div>
                <div class="row-item" style="flex:1;"><span class="row-label">【验证】</span><textarea class="row-input" id="dt-blocker" rows="1" oninput="autoResize(this)" style="min-height:46px;"></textarea></div>
            </div>
            <div class="btn-col">
                <button class="act-btn red" onclick="openCarousel()" title="查看历史"><i class="fa-solid fa-folder-open"></i></button>
                <button class="act-btn" onclick="saveTimeline()" title="存入记录"><i class="fa-solid fa-folder-minus"></i><i class="fa-solid fa-arrow-left" style="font-size:10px;"></i></button>
            </div>
            <input type="file" id="img-input" accept="image/*" style="display:none" onchange="insertImage(this)">
        </div>
    </div>

    <!-- ④ 图片放大层 -->
    <div id="img-lightbox" onclick="this.classList.remove('open')">
        <button id="lb-close" onclick="event.stopPropagation();document.getElementById('img-lightbox').classList.remove('open')"><i class="fa-solid fa-xmark"></i></button>
        <img id="lb-img" src="" alt="">
    </div>

    <!-- ⑤ 历史轮播 -->
    <div id="history-carousel">
        <button onclick="closeCarousel()" style="position:absolute;top:18px;right:20px;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;z-index:1;"><i class="fa-solid fa-xmark"></i></button>
        <div id="c-inner" style="width:100%;padding:0 24px;"></div>
        <div class="c-nav">
            <button class="c-arrow" onclick="carouselStep(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="c-counter"></span>
            <button class="c-arrow" onclick="carouselStep(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- ⑥ PWA 安装弹窗 -->
    <div id="install-prompt">
        <div id="s-idle" class="i-state on">
            <div style="font-size:24px;margin-bottom:8px;">📲</div>
            <div style="font-size:15px;font-weight:bold;margin-bottom:4px;">添加到主屏幕</div>
            <div style="font-size:12px;color:#888;margin-bottom:18px;line-height:1.5;">离线可用 · 启动更快 · 数据保存本地</div>
            <div style="display:flex;gap:10px;">
                <button onclick="doInstall()" style="background:#b8211b;color:#fff;border:none;border-radius:9px;padding:10px 0;font-size:14px;cursor:pointer;font-weight:bold;flex:1;">安装</button>
                <button onclick="dismissInstall()" style="background:#f2f2f2;color:#666;border:none;border-radius:9px;padding:10px 16px;font-size:13px;cursor:pointer;">不了</button>
            </div>
        </div>
        <div id="s-waiting" class="i-state">
            <div style="font-size:13px;font-weight:bold;color:#333;margin-bottom:14px;">👆 请在上方弹窗中点击"安装"</div>
            <div id="istep-1" class="i-step" style="background:#fff8f8;border:1.5px solid #b8211b;">
                <span class="i-num" style="background:#b8211b;">1</span><span style="color:#333;">系统弹窗已出现</span><span style="margin-left:auto;">⬆️</span>
            </div>
            <div id="istep-2" class="i-step" style="background:#f7f7f7;border:1.5px solid #ddd;">
                <span class="i-num" style="background:#ddd;">2</span><span style="color:#aaa;">点击弹窗中的"安装"</span>
            </div>
            <div id="istep-3" class="i-step" style="background:#f7f7f7;border:1.5px solid #ddd;">
                <span class="i-num" style="background:#ddd;">3</span><span style="color:#aaa;">完成，图标出现在桌面</span>
            </div>
            <div style="font-size:11px;color:#ccc;margin-top:8px;">若弹窗未出现，请刷新再试</div>
        </div>
        <div id="s-success" class="i-state">
            <div style="font-size:32px;margin-bottom:10px;">🎉</div>
            <div style="font-size:15px;font-weight:bold;color:#2a7a45;margin-bottom:4px;">已添加到主屏幕</div>
            <div style="font-size:12px;color:#aaa;">可以从桌面直接打开了</div>
        </div>
        <div id="s-cancelled" class="i-state">
            <div style="font-size:22px;margin-bottom:8px;">👌</div>
            <div style="font-size:14px;color:#666;margin-bottom:14px;line-height:1.5;">没关系，下次想装<br>刷新页面就能再试</div>
            <button onclick="dismissInstall()" style="background:#f2f2f2;color:#666;border:none;border-radius:9px;padding:9px 24px;font-size:13px;cursor:pointer;">关闭</button>
        </div>
    </div>

</div><!-- /#app -->

<script>
/* ═══════════════════════════════════════════
   IndexedDB — 数据持久化（不受清浏览记录影响）
   ═══════════════════════════════════════════ */
const DB_NAME = 'LastBookDB', DB_VER = 1, STORE = 'kv';
let db = null;

function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror   = e => rej(e);
    });
}
function dbGet(key) {
    return new Promise((res, rej) => {
        const r = db.transaction(STORE,'readonly').objectStore(STORE).get(key);
        r.onsuccess = e => res(e.target.result ?? null);
        r.onerror   = rej;
    });
}
function dbSet(key, val) {
    return new Promise((res, rej) => {
        const r = db.transaction(STORE,'readwrite').objectStore(STORE).put(val, key);
        r.onsuccess = res; r.onerror = rej;
    });
}

/* ═══════════════════════════════════════════
   应用状态
   ═══════════════════════════════════════════ */
let notes = [], archived = [], activeId = null;

async function loadData() {
    notes    = (await dbGet('notes'))    || [];
    archived = (await dbGet('archived')) || [];
    const theme = (await dbGet('theme')) || 'default';
    notes.forEach(n => n.isLoading = false);
    applyTheme(theme);
    renderNotes();
    renderArchive();
}

async function saveData() {
    await Promise.all([dbSet('notes', notes), dbSet('archived', archived)]);
}

/* ═══════════════════════════════════════════
   工具
   ═══════════════════════════════════════════ */
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function checkEditorEmpty(el) { el.dataset.empty = (!el.innerHTML.trim() || el.innerHTML === '<br>') ? 'true' : 'false'; }
function findNote(id) { return notes.find(n => n.id === id) || archived.find(n => n.id === id); }
function showLightbox(src) { document.getElementById('lb-img').src = src; document.getElementById('img-lightbox').classList.add('open'); }

const EMOJIS = ['📖','🌲','☝️','😭','😄','😈','👀','❤️','😟','😔','☁️','✨','🎯','💭','🌊','🔥','🍃','🌙'];
function randEmoji() { return EMOJIS[Math.floor(Math.random() * EMOJIS.length)]; }

/* ═══════════════════════════════════════════
   笔记列表
   ═══════════════════════════════════════════ */
document.getElementById('main-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addNote(); }
});

async function addNote() {
    const input = document.getElementById('main-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';

    const id = 'note_' + Date.now();
    notes.unshift({ id, original: text, summary: '思考中…', isLoading: true, contentHTML: '', history: [], currentBlocker: '' });
    renderNotes();
    await saveData();

    await new Promise(r => setTimeout(r, 900));
    const note = findNote(id);
    if (note) {
        note.summary   = '✨ ' + (text.length > 20 ? text.slice(0,20) + '…' : text);
        note.isLoading = false;
        renderNotes(); await saveData();
    }
}

function endEdit(id, el) {
    el.setAttribute('contenteditable','false');
    const text = el.innerText.trim();
    const note = findNote(id);
    if (!note) return;
    if (text) { note.summary = text; saveData(); }
    else el.innerText = note.summary;
}

function handleEditKey(e, el) { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } }

function renderNotes() {
    const c = document.getElementById('notes-container');
    c.innerHTML = '';
    notes.forEach(note => {
        const wrap = document.createElement('div');
        wrap.className = 'note-wrapper';
        wrap.dataset.id = note.id;
        wrap.innerHTML = `
            <div class="note-item" id="${note.id}">
                <div class="note-text ${note.isLoading ? 'loading' : ''}"
                     contenteditable="false"
                     onblur="endEdit('${note.id}',this)"
                     onkeydown="handleEditKey(event,this)">${note.summary}</div>
            </div>`;
        c.appendChild(wrap);
        if (!note.isLoading) bindSwipe(document.getElementById(note.id));
    });
}

function renderArchive() {
    const c = document.getElementById('archive-container');
    c.innerHTML = '';
    archived.forEach(note => {
        const div = document.createElement('div');
        div.className = 'archive-item';
        div.innerHTML = `
            <div class="archive-row">
                <div class="arch-del" onclick="deleteArchived('${note.id}',event)"><i class="fa-solid fa-xmark"></i></div>
                <div class="arch-label" onclick="openDetail('${note.id}')">已收纳: ${note.summary}</div>
                <div class="arch-restore" onclick="restoreArchived('${note.id}',event)">🫱</div>
            </div>`;
        c.appendChild(div);
    });
}

async function moveToArchive(id) {
    const i = notes.findIndex(n => n.id === id);
    if (i < 0) return;
    archived.unshift(notes.splice(i,1)[0]);
    renderNotes(); renderArchive(); await saveData();
}

async function deleteArchived(id, e) {
    e.stopPropagation();
    archived = archived.filter(n => n.id !== id);
    renderArchive(); await saveData();
}

async function restoreArchived(id, e) {
    e.stopPropagation();
    const i = archived.findIndex(n => n.id === id);
    if (i < 0) return;
    notes.unshift(archived.splice(i,1)[0]);
    renderNotes(); renderArchive(); await saveData();
}

function openArchive()  { document.getElementById('archive-view').classList.add('active'); }
function closeArchive() { document.getElementById('archive-view').classList.remove('active'); }

/* ═══════════════════════════════════════════
   滑动手势
   ═══════════════════════════════════════════ */
function bindSwipe(el) {
    let sx=0, sy=0, cx=0, swiping=false, vertical=false, lastTap=0;
    const wrap = el.parentElement;
    const txt  = el.querySelector('.note-text');

    el.addEventListener('pointerdown', e => {
        if (txt?.getAttribute('contenteditable') === 'true') return;
        sx=e.clientX; sy=e.clientY; cx=0; swiping=false; vertical=false;
        el.style.transition='none'; el.setPointerCapture(e.pointerId);
    });

    el.addEventListener('pointermove', e => {
        if (txt?.getAttribute('contenteditable') === 'true' || vertical || !el.hasPointerCapture(e.pointerId)) return;
        const dx=e.clientX-sx, dy=e.clientY-sy;
        if (!swiping) {
            if (Math.abs(dx)>10 && Math.abs(dx)>Math.abs(dy)) swiping=true;
            else if (Math.abs(dy)>10) { vertical=true; return; }
        }
        if (swiping) {
            cx = dx>150 ? 150+(dx-150)*0.2 : dx<-150 ? -150+(dx+150)*0.2 : dx;
            el.style.transform = `translateX(${cx}px)`;
            const t = Math.min(Math.abs(cx)/100,1);
            wrap.style.background = cx<0 ? `rgba(92,184,92,${t*0.8})` : cx>0 ? `rgba(91,192,222,${t*0.8})` : '';
        }
    });

    const up = e => {
        if (txt?.getAttribute('contenteditable') === 'true') return;
        if (el.hasPointerCapture(e.pointerId)) el.releasePointerCapture(e.pointerId);

        if (!swiping && !vertical) {
            const now = Date.now(), gap = now - lastTap;
            if (gap < 300 && gap > 0 && txt && !txt.classList.contains('loading')) {
                txt.setAttribute('contenteditable','true'); txt.focus();
                const r = document.createRange(); r.selectNodeContents(txt); r.collapse(false);
                window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
                e.preventDefault();
            }
            lastTap = now;
        }

        if (swiping) {
            el.style.transition = 'transform 0.3s cubic-bezier(0.25,0.8,0.25,1)';
            if (cx > 70) {
                el.style.transform='translateX(100%)';
                setTimeout(()=>{ el.style.transform=''; wrap.style.background=''; openDetail(wrap.dataset.id); },300);
            } else if (cx < -70) {
                el.style.transform='translateX(-100%)';
                setTimeout(()=>{ wrap.style.background=''; moveToArchive(wrap.dataset.id); },300);
            } else {
                el.style.transform=''; wrap.style.background='';
            }
        }
        swiping=false; vertical=false;
    };
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
}

/* ═══════════════════════════════════════════
   详情页
   ═══════════════════════════════════════════ */
function openDetail(id) {
    activeId = id;
    const note = findNote(id);
    if (!note) return;
    document.getElementById('detail-view').classList.add('active');
    const editor = document.getElementById('detail-editor');
    editor.innerHTML = note.contentHTML || note.original;
    checkEditorEmpty(editor);
    document.getElementById('dt-time').value = new Date().toLocaleString();
    const blocker = document.getElementById('dt-blocker');
    blocker.value = note.currentBlocker || '';
    blocker.placeholder = randEmoji();
    autoResize(blocker);
}

async function closeDetail() {
    if (activeId) {
        const note = findNote(activeId);
        if (note) {
            note.contentHTML    = document.getElementById('detail-editor').innerHTML;
            note.currentBlocker = document.getElementById('dt-blocker').value;
            await saveData();
        }
    }
    document.getElementById('detail-view').classList.remove('active');
    activeId = null;
}

async function saveTimeline() {
    if (!activeId) return;
    const note = findNote(activeId);
    if (!note) return;
    const timeVal   = document.getElementById('dt-time').value;
    const blockerEl = document.getElementById('dt-blocker');
    // 若未填写，使用 placeholder emoji 作为内容，避免"无文字内容"
    const blockerVal = blockerEl.value.trim() || blockerEl.placeholder;

    note.history.unshift({ time: timeVal, blocker: blockerVal });
    await saveData();

    // 折叠动画
    const box = document.getElementById('timeline-box');
    box.classList.add('folding');
    setTimeout(async () => {
        box.classList.remove('folding');
        document.getElementById('dt-time').value = new Date().toLocaleString();
        blockerEl.value = ''; blockerEl.placeholder = randEmoji();
        autoResize(blockerEl);
        note.currentBlocker = '';
        await saveData();
    }, 380);
}

function insertImage(input) {
    const file = input.files[0]; if (!file) return;
    input.value = '';
    const editor = document.getElementById('detail-editor');
    if (!editor.innerHTML.trim() || editor.innerHTML === '<br>') editor.innerHTML = '';

    const ph = document.createElement('span');
    ph.textContent = '图片处理中…';
    ph.style.cssText = 'opacity:.4;font-size:13px;font-style:italic;padding:4px 6px;display:inline-block;';
    editor.appendChild(ph);

    const reader = new FileReader();
    reader.onload = e => {
        const orig = new Image();
        orig.onload = () => {
            const MAX=1200, Q=0.75;
            let w=orig.width, h=orig.height;
            if (w>MAX||h>MAX) { if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
            const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
            cv.getContext('2d').drawImage(orig,0,0,w,h);
            ph.remove();
            const img=document.createElement('img');
            img.src=cv.toDataURL('image/jpeg',Q);
            img.onclick=()=>showLightbox(img.src);
            editor.appendChild(img); checkEditorEmpty(editor);
        };
        orig.onerror=()=>{ ph.textContent='图片读取失败'; };
        orig.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

/* ═══════════════════════════════════════════
   历史轮播
   ═══════════════════════════════════════════ */
let cItems=[], cIdx=0;

function openCarousel() {
    if (!activeId) return;
    const note = findNote(activeId);
    if (!note?.history?.length) { alert('暂无历史记录'); return; }
    cItems=note.history; cIdx=0;
    document.getElementById('history-carousel').classList.add('open');
    renderCard();
}
function closeCarousel() { document.getElementById('history-carousel').classList.remove('open'); }
function carouselStep(d) { const n=cIdx+d; if(n>=0&&n<cItems.length){cIdx=n;renderCard();} }

function renderCard() {
    const h = cItems[cIdx];
    // 分离文字与图片
    const tmp = document.createElement('div');
    tmp.innerHTML = h.blocker || '';
    const imgs = [...tmp.querySelectorAll('img')].map(i=>i.src);
    tmp.querySelectorAll('img').forEach(i=>i.remove());
    // 如果 blocker 内容就是一个 emoji（placeholder 存入的情况），直接显示
    const text = tmp.textContent.trim() || h.blocker || '…';

    const imgRow = imgs.length
        ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;">
            ${imgs.map(s=>`<img src="${s}" onclick="showLightbox('${s}')" style="width:52px;height:52px;object-fit:cover;border-radius:6px;cursor:zoom-in;">`).join('')}
           </div>` : '';

    document.getElementById('c-inner').innerHTML = `
        <div class="c-card">
            <button class="c-del" onclick="deleteCard(${cIdx})" title="删除此记录">🗑️</button>
            <div class="c-time">${h.time}</div>
            <div class="c-label">【验证】</div>
            <div class="c-text">${text}</div>
            ${imgRow}
        </div>`;
    document.getElementById('c-counter').textContent = `${cIdx+1} / ${cItems.length}`;
}

async function deleteCard(idx) {
    if (!activeId) return;
    const note = findNote(activeId);
    if (!note) return;
    note.history.splice(idx,1); await saveData();
    cItems = note.history;
    if (!cItems.length) { closeCarousel(); return; }
    cIdx = Math.min(cIdx, cItems.length-1);
    renderCard();
}

/* ═══════════════════════════════════════════
   主题切换
   ═══════════════════════════════════════════ */
const THEMES = ['default','theme-vintage','theme-blue'];
const THEME_COLOR = { default:'#8da48d', 'theme-vintage':'#c9a99a', 'theme-blue':'#c0d6eb' };
let themeIdx = 0;

async function applyTheme(cls) {
    document.body.className = cls;
    document.getElementById('meta-theme-color').content = THEME_COLOR[cls]||'#8da48d';
    themeIdx = THEMES.indexOf(cls);
    if (themeIdx < 0) themeIdx = 0;
    await dbSet('theme', cls);
}
function cycleTheme() { applyTheme(THEMES[(themeIdx+1)%THEMES.length]); }

/* ═══════════════════════════════════════════
   Sortable
   ═══════════════════════════════════════════ */
function initSortable() {
    new Sortable(document.getElementById('notes-container'), {
        animation:180, delay:280, delayOnTouchOnly:false,
        chosenClass:'note-chosen', ghostClass:'note-ghost',
        filter:'[contenteditable="true"]', preventOnFilter:false,
        onEnd: async e => {
            const m=notes.splice(e.oldIndex,1)[0]; notes.splice(e.newIndex,0,m);
            await saveData();
        }
    });
}

/* ═══════════════════════════════════════════
   PWA 安装
   ═══════════════════════════════════════════ */
let deferredPrompt=null, _stepTimer=null;

function showInstall(s) {
    ['idle','waiting','success','cancelled'].forEach(k=>{
        const el=document.getElementById('s-'+k);
        if(el) el.className='i-state'+(k===s?' on':'');
    });
}

window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault(); deferredPrompt=e;
    if(!sessionStorage.getItem('installShown')&&!localStorage.getItem('installDone')){
        setTimeout(()=>{
            showInstall('idle');
            document.getElementById('install-prompt').style.display='block';
            sessionStorage.setItem('installShown','1');
        },1500);
    }
});

window.addEventListener('appinstalled',()=>{
    deferredPrompt=null; showInstall('success');
    localStorage.setItem('installDone','1');
    setTimeout(()=>{ document.getElementById('install-prompt').style.display='none'; },3000);
});

function animateInstallSteps(){
    const A={bg:'#fff8f8',bd:'1.5px solid #b8211b',num:'#b8211b',txt:'#333'};
    const D={bg:'#f0faf4',bd:'1.5px solid #5cb85c',num:'#5cb85c',txt:'#333'};
    const P={bg:'#f7f7f7',bd:'1.5px solid #ddd',   num:'#ddd',   txt:'#aaa'};
    const ap=(id,s)=>{
        const el=document.getElementById(id); if(!el)return;
        el.style.background=s.bg; el.style.border=s.bd;
        el.querySelector('.i-num').style.background=s.num;
        el.querySelectorAll('span')[1].style.color=s.txt;
    };
    ap('istep-1',A); ap('istep-2',P); ap('istep-3',P);
    _stepTimer=setTimeout(()=>{ ap('istep-1',D); ap('istep-2',A); },2000);
}

async function doInstall(){
    if(!deferredPrompt)return;
    showInstall('waiting'); animateInstallSteps(); deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    deferredPrompt=null; clearTimeout(_stepTimer);
    if(outcome==='accepted'){
        showInstall('success'); localStorage.setItem('installDone','1');
        setTimeout(()=>{ document.getElementById('install-prompt').style.display='none'; },3000);
    } else { showInstall('cancelled'); }
}

function dismissInstall(){
    clearTimeout(_stepTimer);
    document.getElementById('install-prompt').style.display='none';
    localStorage.setItem('installDone','1');
}

window.addEventListener('load', async ()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    await openDB();
    await loadData();
    initSortable();
});
